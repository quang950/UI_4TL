<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4TL - Đăng nhập hệ thống</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --accent: #f97316;
        --bg: #f3f4f6;
        --bg-soft: #e5e7eb;
        --card: #ffffff;
        --border: #d1d5db;
        --text: #111827;
        --text-soft: #6b7280;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        min-height: 100vh;
        background: radial-gradient(
          circle at top,
          #e5f0ff 0,
          #f9fafb 45%,
          #f3f4f6 100%
        );
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .shell {
        max-width: 420px;
        width: 100%;
        background: #ffffff;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
        padding: 24px 24px 24px;
      }

      .brand-row {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 0.5px;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.45);
      }

      .right-panel {
        background: #ffffff;
      }

      .right-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .right-subtitle {
        font-size: 12px;
        color: var(--text-soft);
        margin-bottom: 18px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
      }

      label {
        font-size: 11px;
        color: var(--text-soft);
      }

      input,
      select {
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 7px 9px;
        font-size: 13px;
        background: #f9fafb;
        color: var(--text);
      }

      input:focus,
      select:focus {
        outline: 1px solid rgba(37, 99, 235, 0.9);
        border-color: rgba(37, 99, 235, 0.9);
      }

      .btn-row {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid transparent;
        padding: 8px 18px;
        font-size: 13px;
        cursor: pointer;
        font-weight: 500;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        border-color: rgba(37, 99, 235, 0.95);
        color: #f9fafb;
      }

      .btn-secondary {
        background: #e5e7eb;
        border-color: #d1d5db;
        color: #111827;
      }

      .helper-row {
        margin-top: 10px;
        font-size: 11px;
        color: var(--text-soft);
        text-align: right;
      }

      .helper-row a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .helper-row a:hover {
        text-decoration: underline;
      }

      .login-error {
        margin-top: 8px;
        font-size: 12px;
        color: var(--danger);
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="brand-row">
        <div class="brand-logo">4TL</div>
      </div>
      <div class="right-panel">
        <h2 class="right-title">Cửa hàng tiện lợi 4TL</h2>

        <div class="form-grid">
          <div class="form-field">
            <label for="username">Tên đăng nhập</label>
            <input id="username" placeholder="username" />
          </div>
          <div class="form-field">
            <label for="password">Mật khẩu</label>
            <input id="password" type="password" placeholder="password" />
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="login-btn" type="button">
            Đăng nhập
          </button>
        </div>
        <div class="login-error" id="login-error"></div>

        <div class="helper-row">
          <a href="#">Quên mật khẩu?</a>
        </div>
      </div>
    </div>

    <script>
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("login-btn");
      const loginError = document.getElementById("login-error");

      const submitLogin = async () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
          loginError.textContent = "Vui lòng nhập tên đăng nhập và mật khẩu.";
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Đang đăng nhập...";
        loginError.textContent = "";

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          if (!response.ok) {
            const payload = await response.json().catch(() => ({}));
            throw new Error(payload.error || "Đăng nhập thất bại.");
          }

          window.location.href = "4TLkhachhang.html";
        } catch (error) {
          loginError.textContent =
            error.message || "Không thể kết nối máy chủ.";
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = "Đăng nhập";
        }
      };

      loginBtn.addEventListener("click", submitLogin);
      [usernameInput, passwordInput].forEach((input) => {
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            submitLogin();
          }
        });
      });
    </script>
  </body>
</html>
